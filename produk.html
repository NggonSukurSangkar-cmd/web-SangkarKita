<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produk - NggonSukurSangkar</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;}
body{background:#f1f5f9;}

header{
background:#0f172a;
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;
color:#facc15;
}

nav a{
color:white;
text-decoration:none;
margin-left:18px;
}

.hero{
padding:50px 8%;
text-align:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

.grid{
padding:50px 8%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:230px;
object-fit:cover;
cursor:pointer;
}

.content{
padding:20px;
}

.content h3{
margin-bottom:10px;
font-size:22px;
}

.price{
font-size:26px;
font-weight:bold;
color:#f59e0b;
margin-top:10px;
}

a.link{
text-decoration:none;
color:inherit;
}
</style>
</head>
<body>

<header>
<div class="logo">NggonSukurSangkar</div>

</nav>
</header>

<h1>Daftar Produk Sangkar</h1>
<p>Klik gambar produk untuk melihat detail seperti marketplace</p>
</section>

<section class="grid">

<a href="detail-standar.html" class="link">
<div class="card">
<html src="standar.jpeg">
<div class="content">
<h3>Sangkar Standar</h3>
<div class="price">Rp350.000</div>
</div>
</div>
</a>

<a href="detail-minimalis.html" class="link">
<div class="card">
<html src="minimalis.jpeg">

</div>
</div>

<a href="detail-jati.html" class="link">

<div class="content">

<a href="detail-ukiran.html" class="link">

<div class="content">

</div>
</a>

</section>

</body>
