<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f8fafc;
}

/* HEADER */
header{
background:#0f172a;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;
color:#facc15;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
transition:0.3s;
}

nav a:hover{
color:#facc15;
}

/* BOX KONTAK */
.container{
max-width:700px;
margin:70px auto;
background:white;
padding:45px;
border-radius:22px;
box-shadow:0 15px 30px rgba(0,0,0,0.08);
text-align:center;
}

.container h1{
font-size:40px;
margin-bottom:15px;
color:#0f172a;
}

.container p{
font-size:18px;
color:#555;
margin:12px 0;
line-height:1.7;
}

/* LINK MAPS */
.map-link{
display:inline-block;
margin-top:10px;
color:#2563eb;
font-weight:bold;
text-decoration:none;
transition:0.3s;
}

.map-link:hover{
color:#1d4ed8;
}

/* BUTTON */
.btn-wa,
.btn-maps{
display:inline-block;
margin-top:20px;
padding:15px 30px;
color:white;
font-size:18px;
font-weight:bold;
text-decoration:none;
border-radius:40px;
transition:0.3s;
cursor:pointer;
border:none;
margin-left:5px;
margin-right:5px;
}

.btn-wa{
background:#25d366;
box-shadow:0 10px 25px rgba(37,211,102,0.25);
}

.btn-wa:hover{
transform:translateY(-4px);
background:#1ebe5d;
}

.btn-maps{
background:#2563eb;
box-shadow:0 10px 25px rgba(37,99,235,0.25);
}

.btn-maps:hover{
transform:translateY(-4px);
background:#1d4ed8;
}

footer{
margin-top:80px;
background:#0f172a;
color:white;
text-align:center;
padding:25px;
}

@media(max-width:768px){

header{
flex-direction:column;
gap:15px;
}

nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

nav a{
margin-left:0;
}

.container{
margin:40px 20px;
padding:30px;
}

.container h1{
font-size:32px;
}

}
</style>
</head>
